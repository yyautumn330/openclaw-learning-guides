<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>番茄专注钟 - 主界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #FF6B6B 0%, #FF8F8F 100%);
            width: 1080px;
            height: 1920px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 40px;
        }
        .status-bar {
            width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 80px;
        }
        .mode-badge {
            background: rgba(255,255,255,0.25);
            color: white;
            padding: 12px 32px;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 60px;
            backdrop-filter: blur(10px);
        }
        .tomato-icon {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin-bottom: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .timer-display {
            font-size: 160px;
            font-weight: 700;
            color: white;
            text-shadow: 3px 3px 12px rgba(0,0,0,0.2);
            margin-bottom: 100px;
            font-variant-numeric: tabular-nums;
        }
        .control-buttons {
            display: flex;
            gap: 24px;
            margin-bottom: 80px;
        }
        .btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 36px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary {
            background: white;
            color: #FF6B6B;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        .stats-card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .stats-title {
            font-size: 18px;
            color: #868E96;
            margin-bottom: 12px;
        }
        .stats-value {
            font-size: 52px;
            font-weight: 700;
            color: #FF6B6B;
        }
        .home-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋</span>
    </div>
    <div class="mode-badge">🍅 专注模式</div>
    <div class="tomato-icon">🍅</div>
    <div class="timer-display">25:00</div>
    <div class="control-buttons">
        <button class="btn btn-secondary">⏮</button>
        <button class="btn btn-primary">▶</button>
        <button class="btn btn-secondary">⏭</button>
    </div>
    <div class="stats-card">
        <div class="stats-title">今日完成</div>
        <div class="stats-value">4 个番茄</div>
    </div>
    <div class="home-indicator"></div>
</body>
</html>
